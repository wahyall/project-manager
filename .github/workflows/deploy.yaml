name: Deploy to VPS

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: client

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_URL_FALLBACK: ${{ secrets.NEXT_PUBLIC_API_URL_FALLBACK }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_SOCKET_URL_FALLBACK: ${{ secrets.NEXT_PUBLIC_SOCKET_URL_FALLBACK }}
          NEXT_PUBLIC_IMGBB_API_KEY: ${{ secrets.NEXT_PUBLIC_IMGBB_API_KEY }}
        run: npm run build

      - name: Assemble standalone output
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cp package.json deploy/package.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build output to VPS
        run: |
          rsync -avz --delete \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      - name: Move /client to Project Directory
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            if [ -d "/app/client" ]; then
              echo "/app/client already exists, removing it..."
              sudo rm -rf /app/client
            fi
            sudo mv ${{ secrets.VPS_PATH }}/client/* ${{ secrets.VPS_PATH }}
            sudo mv ${{ secrets.VPS_PATH }}/client/.next/* ${{ secrets.VPS_PATH }}/.next
          '

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            sudo systemctl restart client.ynittiba.com
          '
